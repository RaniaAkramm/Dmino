            { x: 150, y: 100, p1: 5, p2: 4, isVertical: false, isDouble: false },

        // دالة رسم قطعة دومينو واقعية بنقاطها
        function drawDomino(x, y, p1, p2, isVertical, isDouble) {
            let w = isVertical ? 36 : 70;
            let h = isVertical ? 70 : 36;

            ctx.save();
            
            // تصميم جسم القطعة (لون عاجي/كريمي مثل الصورة)
            ctx.fillStyle = "#fbf9f3";
            ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
            ctx.shadowBlur = 6;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 4;
            
            // رسم مستطيل القطعة بزوايا دائرية خفيفة
            ctx.beginPath();
            ctx.roundRect(x, y, w, h, 4);
            ctx.fill();
            ctx.shadowColor = "transparent"; // إلغاء الظل للمكونات الداخلية
            
            ctx.strokeStyle = "#2b1d0c";
            ctx.lineWidth = 2;
            ctx.stroke();

            // رسم الخط الفاصل الأسود في المنتصف
            ctx.strokeStyle = "#4a3b2c";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            if (isVertical) {
                ctx.moveTo(x, y + h/2); ctx.lineTo(x + w, y + h/2);
            } else {
                ctx.moveTo(x + w/2, y); ctx.lineTo(x + w/2, y + h);
            }
            ctx.stroke();

            // رسم نقطة المنتصف النحاسية البسيطة (الموجودة في الدومينو الحقيقي)
            ctx.fillStyle = "#8a7355";
            ctx.beginPath();
            if (isVertical) ctx.arc(x + w/2, y + h/2, 2, 0, Math.PI * 2);
            else ctx.arc(x + w/2, y + h/2, 2, 0, Math.PI * 2);
            ctx.fill();

            // دالة مصغرة لرسم النقاط السوداء داخل القطعة
            function drawDots(num, cx, cy, size) {
                ctx.fillStyle = "#111";
                // توزيع مبسط للنقاط بناءً على الرقم
                if (num === 1) {
                    ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2); ctx.fill();
                } else if (num === 2) {
                    ctx.beginPath(); ctx.arc(cx-size/4, cy-size/4, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx+size/4, cy+size/4, 2.5, 0, Math.PI*2); ctx.fill();
                } else if (num === 3) {
                    ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx-size/4, cy-size/4, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx+size/4, cy+size/4, 2.5, 0, Math.PI*2); ctx.fill();
                } else if (num >= 4) {
                    ctx.beginPath(); ctx.arc(cx-size/4, cy-size/4, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx+size/4, cy-size/4, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx-size/4, cy+size/4, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx+size/4, cy+size/4, 2.5, 0, Math.PI*2); ctx.fill();
                }
                if (num === 5) {
                    ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI*2); ctx.fill();
                }
                if (num === 6) {
                    ctx.beginPath(); ctx.arc(cx-size/4, cy, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx+size/4, cy, 2.5, 0, Math.PI*2); ctx.fill();
                }
            }

            // تحديد مراكز النصفين لرسم النقاط
            if (isVertical) {
                drawDots(p1, x + w/2, y + h/4, 30);
                drawDots(p2, x + w/2, y + (3*h)/4, 30);
            } else {
                drawDots(p1, x + w/4, y + h/2, 30);
                drawDots(p2, x + (3*w)/4, y + h/2, 30);
            }

            ctx.restore();
        }
