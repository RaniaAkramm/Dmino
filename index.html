<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMino PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* خلفية الطاولة الخشبية المحسنة */
        .wood-table {
            background-color: #543d2b;
            background-image: radial-gradient(rgba(255,255,255,0.03) 15%, transparent 20%),
                              linear-gradient(45deg, rgba(0,0,0,0.15) 25%, transparent 25%),
                              radial-gradient(rgba(0,0,0,0.4) 40%, rgba(0,0,0,0.7));
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-between p-3 font-sans select-none">

    <header class="text-center py-2 px-4 bg-slate-950 rounded-lg shadow-lg flex justify-between items-center">
        <h1 class="text-2xl font-black tracking-wider text-amber-500">DMino PRO</h1>
        <button onclick="restartGame()" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-1 px-4 rounded-full text-xs transition">
            توزيع جديد 🔄
        </button>
    </header>

    <main class="flex-grow flex items-center justify-center my-3 p-1 rounded-xl wood-table shadow-2xl border-2 border-amber-950 relative overflow-hidden min-h-[350px]">
        <canvas id="dominoCanvas" width="400" height="500" class="w-full h-full object-contain"></canvas>
    </main>

    <footer class="bg-slate-950 p-3 rounded-lg border border-slate-800">
        <h3 class="text-[10px] text-amber-400 font-mono mb-2 tracking-wider text-center">اضغط على القطعة لترميها في المسار المتعرج</h3>
        <div id="player-hand" class="flex flex-wrap gap-2 justify-center min-h-[75px]">
            </div>
    </footer>

    <script>
        const canvas = document.getElementById('dominoCanvas');
        const ctx = canvas.getContext('2d');

        // قطع تجريبية في يد اللاعب
        let playerHand = [[6,6], [6,3], [3,5], [5,5], [5,1], [1,2], [2,4]];
        
        // مسار الأحجار بشكل متعرج يناسب شاشة الهاتف الطولية
        let playedPieces = [
            { x: 175, y: 50,  p1: 6, p2: 6, isVertical: false, isDouble: true },
            { x: 175, y: 100, p1: 6, p2: 3, isVertical: true,  isDouble: false },
            { x: 175, y: 165, p1: 3, p2: 3, isVertical: false, isDouble: true },
            // لفة إلى اليمين
            { x: 230, y: 165, p1: 3, p2: 5, isVertical: false, isDouble: false },
            { x: 295, y: 165, p1: 5, p2: 5, isVertical: true,  isDouble: true },
            // نزول لأسفل اللوحة
            { x: 295, y: 230, p1: 5, p2: 1, isVertical: true,  isDouble: false },
            { x: 295, y: 295, p1: 1, p2: 2, isVertical: true,  isDouble: false },
            // لفة إلى اليسار
            { x: 230, y: 310, p1: 2, p2: 2, isVertical: false, isDouble: true },
            { x: 165, y: 310, p1: 2, p2: 4, isVertical: false, isDouble: false }
        ];

        // دالة آمنة لرسم المستطيلات بزوايا دائرية متوافقة مع كل الهواتف القديمة والحديثة
        function drawRoundedRect(x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        // دالة رسم قطعة الدومينو بنقاطها
        function drawDomino(x, y, p1, p2, isVertical, isDouble) {
            let w = isVertical ? 32 : 56;
            let h = isVertical ? 56 : 32;

            ctx.save();
            
            // تصميم اللون العاجي وجعل الظل خفيف ليناسب الهواتف
            ctx.fillStyle = "#fcfaf4";
            ctx.shadowColor = "rgba(0, 0, 0, 0.35)";
            ctx.shadowBlur = 4;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            
            // رسم جسم القطعة بالدالة الآمنة البديلة
            drawRoundedRect(x, y, w, h, 4);
            ctx.fill();
            ctx.shadowColor = "transparent"; // إلغاء الظل للداخل
            
            ctx.strokeStyle = "#2d1f10";
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // الخط الفاصل بالمنتصف
            ctx.strokeStyle = "#5c4d3c";
            ctx.lineWidth = 1;
            ctx.beginPath();
            if (isVertical) {
                ctx.moveTo(x, y + h/2); ctx.lineTo(x + w, y + h/2);
            } else {
                ctx.moveTo(x + w/2, y); ctx.lineTo(x + w/2, y + h);
            }
            ctx.stroke();

            // رسم النقطة النحاسية المركزية
            ctx.fillStyle = "#8c765c";
            ctx.beginPath();
            ctx.arc(x + w/2, y + h/2, 1.5, 0, Math.PI * 2);
            ctx.fill();

            // دالة رسم النقاط السوداء بدقة وحجم مناسب للهاتف
            function drawDots(num, cx, cy, size) {
                ctx.fillStyle = "#111";
                const r = 2; // نصف قطر النقطة السوداء
                if (num === 1) {
                    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
                } else if (num === 2) {
                    ctx.beginPath(); ctx.arc(cx-size/4, cy-size/4, r, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx+size/4, cy+size/4, r, 0, Math.PI*2); ctx.fill();
                } else if (num === 3) {
                    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx-size/4, cy-size/4, r, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx+size/4, cy+size/4, r, 0, Math.PI*2); ctx.fill();
                } else if (num >= 4) {
                    ctx.beginPath(); ctx.arc(cx-size/4, cy-size/4, r, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx+size/4, cy-size/4, r, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx-size/4, cy+size/4, r, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx+size/4, cy+size/4, r, 0, Math.PI*2); ctx.fill();
                }
                if (num === 5) {
                    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
                }
                if (num === 6) {
                    ctx.beginPath(); ctx.arc(cx-size/4, cy, r, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx+size/4, cy, r, 0, Math.PI*2); ctx.fill();
                }
            }

            // تحديد توزيع النقاط
            if (isVertical) {
                drawDots(p1, x + w/2, y + h/4, 24);
                drawDots(p2, x + w/2, y + (3*h)/4, 24);
            } else {
                drawDots(p1, x + w/4, y + h/2, 24);
                drawDots(p2, x + (3*w)/4, y + h/2, 24);
            }

            ctx.restore();
        }

        // رسم اللوحة بالكامل
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            playedPieces.forEach(p => {
                drawDomino(p.x, p.y, p.p1, p.p2, p.isVertical, p.isDouble);
            });
        }

        // عرض الأحجار بأسفل الشاشة (HTML مخصص للهاتف)
        function renderHand() {
            const handDiv = document.getElementById('player-hand');
            handDiv.innerHTML = '';
            playerHand.forEach((piece, index) => {
                const el = document.createElement('div');
                el.className = "w-9 h-16 bg-[#fcfaf4] text-slate-950 border border-amber-950 rounded flex flex-col justify-around items-center font-black text-sm cursor-pointer shadow-md active:bg-amber-100";
                el.onclick = () => simulatePlay(index);
                el.innerHTML = `<span>${piece[0]}</span><div class="w-full h-[1px] bg-slate-300"></div><span>${piece[1]}</span>`;
                handDiv.appendChild(el);
            });
        }

        // إضافة القطعة الملعوبة لنهاية المسار المتعرج
        function simulatePlay(index) {
            const piece = playerHand[index];
            const isDouble = piece[0] === piece[1];
            let last = playedPieces[playedPieces.length - 1];
            
            // جعل القطع الجديدة تواصل الالتفاف لليسار ولأعلى لضمان البقاء داخل شاشة الهاتف
            let newX = last.x - 45;
            let newY = last.y;
            
            if(newX < 20) { // حماية حتى لا تخرج القطع عن يسار الشاشة
                newX = last.x;
                newY = last.y + 45;
            }

            playedPieces.push({
                x: newX, y: newY,
                p1: piece[0], p2: piece[1],
                isVertical: !isDouble,
                isDouble: isDouble
            });

            playerHand.splice(index, 1);
            drawBoard();
            renderHand();
        }

        function restartGame() {
            playedPieces = [{ x: 175, y: 60, p1: 6, p2: 6, isVertical: false, isDouble: true }];
            playerHand = [[6,3], [3,5], [5,5], [5,2], [2,1], [1,0], [0,0]];
            drawBoard();
            renderHand();
        }

        // تشغيل أولي عند تحميل الصفحة
        drawBoard();
        renderHand();
    </script>
</body>
</html>
