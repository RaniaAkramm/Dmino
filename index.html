<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Dmino - طاولة اللعب</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #2d5a27; } /* لون أخضر طاولة اللعب التقليدي */
        .domino-piece {
            width: 50px; height: 90px;
            background: #fdf6e3; border: 2px solid #5d4037;
            border-radius: 6px; display: flex; flex-direction: column;
            align-items: center; justify-content: space-around;
            font-weight: bold; font-size: 1.2rem; cursor: pointer;
            transition: transform 0.2s;
        }
        .domino-piece:hover { transform: scale(1.05); }
        .board-container {
            display: flex; flex-wrap: wrap; gap: 10px;
            padding: 20px; background: rgba(0,0,0,0.2);
            border-radius: 15px; min-height: 200px;
            align-items: center; justify-content: center;
        }
        .board-piece {
            width: 50px; height: 90px; background: #fff;
            border: 2px solid #333; border-radius: 4px;
            display: flex; flex-direction: column; align-items: center;
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <h1 class="text-white text-4xl font-bold mb-6">DMino Table</h1>

    <!-- منطقة اللعب الرئيسية (الطاولة) -->
    <div id="game-board" class="board-container w-full max-w-4xl shadow-2xl"></div>

    <!-- منطقة اللاعب -->
    <div class="mt-10 bg-black/30 p-6 rounded-t-3xl w-full max-w-4xl">
        <h2 class="text-white text-sm mb-4">أحجارك:</h2>
        <div id="player-hand" class="flex flex-wrap gap-4"></div>
        <button id="draw-btn" onclick="playerDraw()" class="mt-6 bg-yellow-600 text-white px-6 py-2 rounded-lg font-bold">سحب حجر</button>
    </div>

    <script>
        let board = [], playerHand = [], boneyard = [];

        // تحسين عرض الطاولة كخطوط مستمرة
        function renderBoard() {
            const boardDiv = document.getElementById('game-board');
            boardDiv.innerHTML = '';
            board.forEach(piece => {
                const el = document.createElement('div');
                el.className = "board-piece p-1";
                el.innerHTML = `<span>${piece[0]}</span><hr class="w-full border-black my-1"><span>${piece[1]}</span>`;
                boardDiv.appendChild(el);
            });
        }

        // تحسين عرض أحجار اللاعب
        function renderHands() {
            const handDiv = document.getElementById('player-hand');
            handDiv.innerHTML = '';
            playerHand.forEach((piece, index) => {
                const el = document.createElement('div');
                el.className = "domino-piece";
                el.onclick = () => playPiece(index);
                el.innerHTML = `<span>${piece[0]}</span><div class="w-full h-px bg-black"></div><span>${piece[1]}</span>`;
                handDiv.appendChild(el);
            });
        }

        // باقي المنطق البرمجي (كما في السابق)...
        // قمت بتبسيط الدوال هنا لتوضيح الشكل:
        function createDeck() { /* ... */ }
        function startGame() { 
            /* كود التوزيع */
            board = [[2,3], [3,5], [5,6]]; // مثال لشكل السلسلة
            playerHand = [[1,2], [6,6], [0,1], [4,4]];
            renderBoard(); renderHands();
        }
        
        startGame();
    </script>
</body>
</html>
